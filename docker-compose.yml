version: '3.8'

services:
  # Database Service
  postgres:
    image: postgres:15-alpine
    container_name: unifyvault-db-dev
    environment:
      POSTGRES_USER: unifyvault_admin
      POSTGRES_PASSWORD: unifyvault_secure_password_2026
      POSTGRES_DB: unifyvault_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U unifyvault_admin -d unifyvault_dev']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - unifyvault-network

  # Cache & BullMQ Message Broker Service
  redis:
    image: redis:7-alpine
    container_name: unifyvault-redis-dev
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - unifyvault-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  unifyvault-network:
    driver: bridge
