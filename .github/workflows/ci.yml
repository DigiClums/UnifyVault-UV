name: Continuous Integration

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    name: Build, Lint, and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.4.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Formatting
        run: pnpm exec prettier --check "**/*.{ts,tsx,js,json,sol,md,yml,yaml}"

      - name: Lint Workspace
        run: pnpm run lint

      - name: Run Test Suite
        run: pnpm run test

      - name: Build Workspace
        run: pnpm run build

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Check Solidity Formatting
        run: cd packages/protocol && forge fmt --check

      - name: Build Smart Contracts
        run: cd packages/protocol && forge build

      - name: Run Foundry Tests
        run: cd packages/protocol && forge test -vvv

      - name: Run Foundry Coverage
        run: cd packages/protocol && forge coverage
